{{ define "main" }}

<header>

<h1 class="mt-5 text-5xl font-extrabold text-neutral-900 dark:text-neutral">
  {{ .Title }}
</h1>

{{ with .Params.summary }}
<p class="mt-5 text-xl text-neutral-600 dark:text-neutral-400 max-w-4xl">
  {{ . }}
</p>
{{ end }}

</header>

<div class="mt-12 prose dark:prose-invert max-w-none">
  {{ .Content }}
</div>
    
{{ .Content }}

</div>

{{ end }}
