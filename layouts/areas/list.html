{{ define "main" }}

<header>
  <h1 class="mt-5 text-4xl font-extrabold text-neutral-900 dark:text-neutral">
    {{ .Title }}
  </h1>

  <div class="mt-6 prose dark:prose-invert max-w-prose">
    {{ .Content }}
  </div>
</header>

<section class="mt-14">

{{ range .RegularPages.ByWeight }}

<article class="py-8 border-t border-neutral-200 dark:border-neutral-700">

  <h2 class="text-3xl font-semibold">
    <a href="{{ .RelPermalink }}" class="hover:underline">
      {{ .Title }}
    </a>
  </h2>

  {{ with .Params.summary }}
  <p class="mt-3 text-lg text-neutral-600 dark:text-neutral-400 max-w-3xl">
    {{ . }}
  </p>
  {{ end }}

</article>

{{ end }}

</section>

{{ end }}
